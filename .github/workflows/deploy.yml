name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download latest data artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: parking-data
          workflow: update-data.yml
          path: .
          if_no_artifact_found: fail

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp parking_data.json _site/
          cp manifest.json _site/
          cp favicon.ico _site/
          cp icon.svg _site/
          cp icon-192.png _site/
          cp icon-512.png _site/
          cp og-image.png _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
